<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 - 뽀모</title>
  <style>
    body{ margin:0; min-height:100vh; display:grid; place-items:center; background:#fff7fb; font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif; color:#2b2b2b; padding:20px; }
    .card{ width:min(420px,100%); background:#fff; border:1px solid #f2d7ea; border-radius:22px; padding:20px; text-align:center; box-shadow:0 14px 42px rgba(78,35,65,.12); }
    h1{ margin:0 0 8px; font-size:22px; }
    p{ line-height:1.55; font-weight:750; color:#444; }
    button{ border:0; border-radius:999px; padding:10px 14px; background:#ffd1e8; font-weight:900; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>앗, 지금은 오프라인이에요 🫧</h1>
    <p>뽀모 기록과 채팅은 Apps Script/Firebase에 연결되어야 해서 인터넷 연결이 필요해요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
