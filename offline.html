<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>뽀모 오프라인</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff7fb;font-family:system-ui,"Noto Sans KR",sans-serif;color:#2b2b2b;padding:20px;}
    .card{max-width:420px;background:#fff;border:1px solid #f2d7ea;border-radius:22px;padding:22px;box-shadow:0 14px 42px rgba(78,35,65,.12);text-align:center;}
    h1{margin:0 0 10px;font-size:22px}.muted{color:#777;font-weight:800;line-height:1.55}.btn{display:inline-block;margin-top:14px;border:1px solid #f2d7ea;border-radius:999px;padding:10px 14px;background:#ffd1e8;color:#2b2b2b;text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <div class="card">
    <h1>🫧 뽀모 연결이 잠깐 끊겼어요</h1>
    <div class="muted">네트워크가 돌아오면 다시 열어주세요. 글자수 기록은 전송 성공 시에만 시트에 반영돼요.</div>
    <a class="btn" href="./">다시 열기</a>
  </div>
</body>
</html>
