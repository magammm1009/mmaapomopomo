<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>뽀모 캐시 초기화</title>
  <style>
    :root{
      --bg:#fff7fb; --card:#fff; --line:#f2d7ea; --pink:#ffd1e8; --text:#2b2b2b; --muted:#777;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center; padding:20px;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      background:var(--bg); color:var(--text);
    }
    .card{
      width:min(460px,100%); background:var(--card); border:1px solid var(--line);
      border-radius:22px; padding:26px 22px; box-shadow:0 14px 42px rgba(78,35,65,.12); text-align:center;
    }
    .icon{font-size:42px; margin-bottom:8px}
    h1{margin:0 0 10px; font-size:22px}
    p{margin:8px 0; line-height:1.55; font-weight:700; color:#444}
    .status{
      margin-top:16px; padding:12px; border-radius:14px; background:#fff7fb; border:1px dashed var(--line);
      font-weight:900; color:#7b214e;
    }
    button{
      margin-top:16px; border:1px solid #ffc0df; background:var(--pink); color:var(--text);
      border-radius:999px; padding:11px 16px; font-weight:900; cursor:pointer; font-size:14px;
    }
    .small{font-size:12px;color:var(--muted);font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">🫧</div>
    <h1>뽀모 업데이트 적용 중</h1>
    <p>예전 서비스 워커와 캐시를 정리한 뒤,<br>최신 뽀모를 다시 엽니다.</p>
    <div id="status" class="status">초기화 준비 중…</div>
    <button id="retry" type="button" hidden>다시 시도</button>
    <p class="small">이 페이지는 한 번만 사용하면 됩니다.</p>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const retryBtn = document.getElementById('retry');

    async function resetPomoPwa(){
      statusEl.textContent = '서비스 워커와 캐시를 정리하는 중…';

      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(
            keys
              .filter((key) => key.startsWith('pomo-pwa-'))
              .map((key) => caches.delete(key))
          );
        }

        statusEl.textContent = '정리 완료! 최신 뽀모로 이동합니다…';
        setTimeout(() => {
          window.location.replace('./?fresh=' + Date.now());
        }, 700);
      } catch (error) {
        console.error(error);
        statusEl.textContent = '자동 초기화에 실패했어요. 아래 버튼을 눌러 다시 시도해 주세요.';
        retryBtn.hidden = false;
      }
    }

    retryBtn.addEventListener('click', resetPomoPwa);
    resetPomoPwa();
  </script>
</body>
</html>
